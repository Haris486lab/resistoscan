<!DOCTYPE html>
<html>
<head>
    <title>ResistoScan</title>
</head>
<body style="text-align:center; font-family:Arial;">

<h1>ResistoScan AI 🚀</h1>

<form id="form">
    <input type="file" name="file" required><br><br>
    <button type="submit">Analyze</button>
</form>

<div id="result"></div>
<div id="plots"></div>

<script>
document.getElementById("form").addEventListener("submit", async function(e){
    e.preventDefault();

    let formData = new FormData(this);

    try {
        let res = await fetch("/upload", {
            method: "POST",
            body: formData
        });

        let data = await res.json();

        document.getElementById("result").innerHTML =
            "<h3>Results</h3>" +
            "ITI: " + data.ITI + "<br>" +
            "Risk: " + data.Risk + "<br>";

        document.getElementById("plots").innerHTML =
            `<h3>Heatmap</h3>
             <img src="data:image/png;base64,${data.heatmap}" width="400"/>
             <h3>Bar Plot</h3>
             <img src="data:image/png;base64,${data.barplot}" width="400"/>
             <h3>PCA</h3>
             <img src="data:image/png;base64,${data.pca}" width="400"/>
             <h3>ML Importance</h3>
             <img src="data:image/png;base64,${data.ml}" width="400"/>`;

    } catch (err) {
        document.getElementById("result").innerHTML =
            "<b style='color:red'>Error:</b> " + err;
    }
});
</script>

</body>
</html>
