<!DOCTYPE html>
<html>
<head>
<title>ResistoScan AI</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 40px;
}

h1 { color: #22c55e; }

.card {
    background: #1e293b;
    padding: 20px;
    margin: 10px;
    border-radius: 10px;
    display: inline-block;
    width: 200px;
}

.low { color: #22c55e; }
.moderate { color: #eab308; }
.high { color: #f97316; }
.critical { color: #ef4444; }

button {
    background: #22c55e;
    border: none;
    padding: 10px 20px;
    color: white;
    border-radius: 6px;
}
</style>
</head>

<body>

<h1>🧬 ResistoScan AI</h1>
<p>AMR Risk Prediction Platform</p>

<form id="form">
    <input type="file" name="file" required><br><br>
    <button type="submit">Analyze</button>
</form>

<div id="dashboard"></div>

<script>
document.getElementById("form").onsubmit = async function(e){
    e.preventDefault();

    let formData = new FormData(this);

    let res = await fetch("/upload", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    let riskClass = data.Risk.toLowerCase();

    document.getElementById("dashboard").innerHTML =
    `
    <div class="card">
        <h3>ITI Score</h3>
        <p>${data.ITI}</p>
    </div>

    <div class="card">
        <h3>Samples</h3>
        <p>${data.Samples}</p>
    </div>

    <div class="card">
        <h3>Risk Level</h3>
        <p class="${riskClass}">${data.Risk}</p>
    </div>
    `;
};
</script>

</body>
</html>
