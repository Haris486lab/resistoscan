<script>
document.getElementById("form").onsubmit = async function(e){
    e.preventDefault();

    let formData = new FormData(this);

    let res = await fetch("/upload", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    if (data.comparison) {
        document.getElementById("dashboard").innerHTML =
        `
        <h2>Comparison</h2>

        <div class="card">
            <h3>Dataset 1</h3>
            ITI: ${data.d1.iti}<br>
            Risk: ${data.d1.risk}
        </div>

        <div class="card">
            <h3>Dataset 2</h3>
            ITI: ${data.d2.iti}<br>
            Risk: ${data.d2.risk}
        </div>
        `;
    } else {
        document.getElementById("dashboard").innerHTML =
        `
        <div class="card">
            <h3>ITI Score</h3>
            ${data.iti}
        </div>

        <div class="card">
            <h3>Risk</h3>
            ${data.risk}
        </div>
        `;
    }
};
</script>
